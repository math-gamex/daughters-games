<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포근한 집 꾸미기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBF3E4; --cream2:#F5E7CE; --ink:#5b4636; --ink2:#8a705a;
  --terra:#E59B73; --terra-d:#cf7f55; --sage:#9DB89A; --sage-d:#7e9c7b;
  --blue:#9FBBCB; --pink:#EAB3B3; --gold:#E7C36B;
  --panel:#fffaf0; --line:#e6d3b3;
  --shadow:0 6px 0 rgba(120,90,60,.12), 0 10px 22px rgba(120,90,60,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:'Gowun Dodum',sans-serif; color:var(--ink);
  background:
    radial-gradient(circle at 12% 18%, #fff7ea 0, transparent 38%),
    radial-gradient(circle at 88% 12%, #fdeedd 0, transparent 40%),
    var(--cream);
  display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  touch-action:manipulation;
}
/* ---------- header ---------- */
header{
  flex:none; padding:9px 12px; display:flex; align-items:center; gap:10px;
  background:linear-gradient(180deg,#fff8ec,#fbeed7);
  border-bottom:3px solid var(--line);
}
.logo{font-family:'Jua',sans-serif; font-size:19px; color:var(--terra-d);
  display:flex; align-items:center; gap:6px; line-height:1;}
.logo small{font-family:'Gowun Dodum'; font-size:11px; color:var(--ink2);}
.count{margin-left:auto; font-family:'Jua'; font-size:13px; color:var(--ink);
  background:#fff; border:2px solid var(--line); border-radius:30px;
  padding:5px 11px; box-shadow:0 3px 0 rgba(120,90,60,.10); white-space:nowrap;}
.count b{color:var(--terra-d);}
/* ---------- toolbar ---------- */
.tools{flex:none; display:flex; gap:7px; padding:8px 12px; overflow-x:auto;
  background:#fbeed7; border-bottom:2px solid var(--line); scrollbar-width:none;}
.tools::-webkit-scrollbar{display:none;}
.tbtn{flex:none; font-family:'Jua'; font-size:12.5px; color:var(--ink);
  background:#fff; border:2px solid var(--line); border-radius:14px;
  padding:7px 12px; box-shadow:0 3px 0 rgba(120,90,60,.10); cursor:pointer;
  display:flex; align-items:center; gap:5px; transition:transform .08s;}
.tbtn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(120,90,60,.10);}
.tbtn.warn{background:#fdeaea; border-color:#f0c9c9; color:#c0594f;}
/* ---------- stage ---------- */
.stage-wrap{flex:1 1 auto; position:relative; overflow:hidden; min-height:0;}
#stage{position:absolute; inset:0; overflow:hidden;
  background-image:var(--wall,linear-gradient(180deg,#dfeaf2,#cfe0ec));}
#stage::before{ /* wall texture dots */
  content:""; position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,.35) 1.4px,transparent 1.5px);
  background-size:22px 22px; opacity:.5; pointer-events:none;}
#floor{position:absolute; left:0; right:0; bottom:0; height:40%;
  background-image:var(--floor,repeating-linear-gradient(90deg,#e3b687 0 26px,#d9a878 26px 52px));
  border-top:4px solid rgba(120,90,60,.22);
  box-shadow:inset 0 8px 16px rgba(120,90,60,.12);}
#floor::after{content:""; position:absolute; top:-4px; left:0; right:0; height:7px;
  background:rgba(255,255,255,.18);}
/* placed items */
.item{position:absolute; cursor:grab; touch-action:none; will-change:transform;
  filter:drop-shadow(0 7px 5px rgba(80,55,35,.22)); user-select:none;}
.item svg{display:block; width:100%; height:auto; pointer-events:none;}
.item.sel{outline:none;}
.item.sel .ring{display:block;}
.ring{display:none; position:absolute; inset:-9px;
  border:2.5px dashed var(--terra-d); border-radius:14px; pointer-events:none;
  animation:spin 9s linear infinite;}
@keyframes spin{to{background-position:30px 0;}}
.empty{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:6px; color:var(--ink2); pointer-events:none; opacity:.8;}
.empty .e1{font-family:'Jua'; font-size:18px;}
.empty .e2{font-size:12.5px;}
/* selection floating toolbar */
#selbar{position:absolute; left:50%; transform:translateX(-50%);
  bottom:10px; display:none; gap:6px; z-index:9999;
  background:#fffaf0; border:2.5px solid var(--line); border-radius:18px;
  padding:7px; box-shadow:var(--shadow);}
#selbar.on{display:flex;}
.sb{width:38px; height:38px; border:none; border-radius:12px; cursor:pointer;
  background:#f3e6cd; font-size:17px; display:flex; align-items:center; justify-content:center;
  color:var(--ink); transition:transform .08s;}
.sb:active{transform:scale(.9);}
.sb.del{background:#fbdada; color:#c0594f;}
/* ---------- mode bar & editor ---------- */
.modebar{flex:none; display:flex; gap:6px; padding:0 12px 6px;}
.mode{flex:1; font-family:'Jua'; font-size:13px; color:var(--ink2);
  background:#f3e6cd; border:2px solid transparent; border-radius:14px;
  padding:8px 4px; cursor:pointer; transition:transform .08s;}
.mode.on{background:#fff; color:var(--terra-d); border-color:var(--terra);
  box-shadow:0 3px 0 rgba(207,127,85,.18);}
.mode:active{transform:translateY(2px);}
.editor{flex:1 1 auto; overflow-y:auto; padding:4px 12px 18px; -webkit-overflow-scrolling:touch;}
.edhead{position:sticky; top:0; z-index:5; background:var(--panel); padding-top:2px;}
.preview-box{display:flex; gap:12px; align-items:center; background:#fff;
  border:2px solid var(--line); border-radius:18px; padding:10px 12px; margin-bottom:6px;
  box-shadow:0 3px 0 rgba(120,90,60,.08);}
.catalog.editing{height:66dvh;}
.preview-svg{flex:none; width:84px; height:104px; display:flex; align-items:center; justify-content:center;}
.preview-svg svg{max-width:100%; max-height:104px;}
.preview-side{flex:1 1 auto; display:flex; flex-direction:column; gap:7px;}
.bigbtn{font-family:'Jua'; font-size:14px; color:#fff; background:var(--terra);
  border:none; border-radius:14px; padding:11px; cursor:pointer; box-shadow:0 4px 0 var(--terra-d);
  transition:transform .08s;}
.bigbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--terra-d);}
.minibtn{font-family:'Jua'; font-size:12.5px; color:var(--ink); background:#f3e6cd;
  border:none; border-radius:12px; padding:9px; cursor:pointer;}
.minibtn:active{transform:scale(.95);}
.prow{margin:9px 0 4px;}
.prow .lbl{font-family:'Jua'; font-size:12.5px; color:var(--ink2); margin:0 0 5px 2px; display:flex; gap:6px; align-items:center;}
.chips{display:flex; gap:6px; overflow-x:auto; padding-bottom:3px; scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none; font-family:'Gowun Dodum'; font-size:12px; color:var(--ink);
  background:#fff; border:2px solid var(--line); border-radius:12px; padding:7px 11px;
  cursor:pointer; white-space:nowrap; transition:transform .08s;}
.chip.on{background:#fff3e6; border-color:var(--terra); color:var(--terra-d); font-family:'Jua';}
.chip:active{transform:scale(.94);}
.colorstrip{background:var(--panel); padding:7px 0 4px;
  border-top:2px dashed var(--line);}
.colorstrip .lbl{font-family:'Jua'; font-size:12px; color:var(--terra-d); margin:0 2px 6px;}
.cols{display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none;}
.cols::-webkit-scrollbar{display:none;}
.cdot{flex:none; width:30px; height:30px; border-radius:50%; border:3px solid #fff; cursor:pointer;
  box-shadow:0 2px 5px rgba(120,90,60,.25); transition:transform .08s;}
.cdot.on{outline:3px solid var(--terra-d); outline-offset:1px;}
.cdot:active{transform:scale(.88);}

.catalog{flex:none; background:var(--panel); border-top:3px solid var(--line);
  display:flex; flex-direction:column; box-shadow:0 -8px 20px rgba(120,90,60,.10);
  transition:height .28s cubic-bezier(.4,1,.4,1); height:46dvh;}
.catalog.min{height:50px;}
.cat-head{flex:none; display:flex; align-items:center; gap:8px; padding:8px 12px 4px;}
.handle{flex:none; width:46px; height:6px; border-radius:6px; background:var(--line);
  position:absolute; left:50%; transform:translateX(-50%); top:6px;}
.cat-title{font-family:'Jua'; font-size:14px; color:var(--terra-d); margin-top:6px;}
.toggle{margin-left:auto; margin-top:6px; font-family:'Jua'; font-size:12px;
  background:#f3e6cd; border:none; border-radius:12px; padding:6px 12px; color:var(--ink); cursor:pointer;}
.search{flex:none; padding:2px 12px 6px;}
.search input{width:100%; font-family:'Gowun Dodum'; font-size:13px; color:var(--ink);
  background:#fff; border:2px solid var(--line); border-radius:14px; padding:8px 13px; outline:none;}
.search input::placeholder{color:#bba98a;}
.tabs{flex:none; display:flex; gap:6px; padding:2px 12px 6px; overflow-x:auto; scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:none; font-family:'Jua'; font-size:12.5px; color:var(--ink2);
  background:#f3e6cd; border:2px solid transparent; border-radius:30px;
  padding:6px 13px; cursor:pointer; white-space:nowrap; display:flex; gap:5px; align-items:center;}
.tab.on{background:#fff; color:var(--terra-d); border-color:var(--terra);
  box-shadow:0 3px 0 rgba(207,127,85,.18);}
.grid{flex:1 1 auto; overflow-y:auto; padding:6px 10px 16px;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); gap:8px;
  align-content:start; -webkit-overflow-scrolling:touch;}
.card{background:#fff; border:2px solid #f0e2c6; border-radius:14px;
  padding:6px 4px 5px; display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; box-shadow:0 3px 0 rgba(120,90,60,.07); transition:transform .1s;}
.card:active{transform:scale(.93);}
.card .thumb{width:100%; height:54px; display:flex; align-items:flex-end; justify-content:center;}
.card .thumb svg{max-width:96%; max-height:54px; width:auto; height:auto;}
.card .nm{font-size:10px; color:var(--ink2); line-height:1.15; text-align:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;}
/* swatches popup */
.pop{position:fixed; inset:0; background:rgba(70,50,35,.32); display:none;
  align-items:flex-end; z-index:10000;}
.pop.on{display:flex;}
.sheet{width:100%; background:var(--panel); border-radius:22px 22px 0 0;
  padding:16px 16px 24px; box-shadow:0 -10px 30px rgba(0,0,0,.2);
  animation:up .3s cubic-bezier(.3,1,.4,1);}
@keyframes up{from{transform:translateY(100%);}}
.sheet h3{font-family:'Jua'; margin:2px 0 10px; color:var(--terra-d); font-size:15px;
  display:flex; align-items:center; gap:8px;}
.sheet h3 .x{margin-left:auto; background:#f3e6cd; border:none; width:30px; height:30px;
  border-radius:50%; font-size:16px; cursor:pointer; color:var(--ink);}
.swrow{display:grid; grid-template-columns:repeat(auto-fill,minmax(46px,1fr)); gap:9px;}
.sw{aspect-ratio:1; border-radius:13px; border:3px solid #fff; cursor:pointer;
  box-shadow:0 3px 8px rgba(120,90,60,.2); position:relative; transition:transform .1s;}
.sw:active{transform:scale(.9);}
.sw span{position:absolute; bottom:-15px; left:0; right:0; text-align:center; font-size:8.5px; color:var(--ink2);}
.sheet.tall{max-height:74dvh; overflow-y:auto;}
</style>
</head>
<body>
<header>
  <div class="logo">🏡 포근한 집 꾸미기 <small>dollhouse</small></div>
  <div class="count">가구 <b id="total">0</b>종</div>
</header>

<div class="tools">
  <button class="tbtn" id="wallBtn">🎨 벽지</button>
  <button class="tbtn" id="floorBtn">🪵 바닥</button>
  <button class="tbtn" id="randBtn">✨ 랜덤 꾸미기</button>
  <button class="tbtn warn" id="clearBtn">🧹 전체 지우기</button>
</div>

<div class="stage-wrap">
  <div id="stage">
    <div id="floor"></div>
    <div class="empty" id="empty">
      <div class="e1">방이 텅 비었어요 🌿</div>
      <div class="e2">아래에서 가구를 톡! 눌러 놓아보세요</div>
    </div>
  </div>
  <div id="selbar">
    <button class="sb" data-act="small">➖</button>
    <button class="sb" data-act="big">➕</button>
    <button class="sb" data-act="flip">↔️</button>
    <button class="sb" data-act="back">⬇️</button>
    <button class="sb" data-act="front">⬆️</button>
    <button class="sb" data-act="copy">📑</button>
    <button class="sb del" data-act="del">🗑️</button>
  </div>
</div>

<div class="catalog" id="catalog">
  <div class="cat-head">
    <div class="handle"></div>
    <div class="cat-title" id="catTitle">가구 카탈로그</div>
    <button class="toggle" id="toggleCat">접기 ▾</button>
  </div>
  <div class="modebar" id="modebar">
    <button class="mode on" data-mode="furniture">🛋️ 가구</button>
    <button class="mode" data-mode="char">👧 캐릭터</button>
    <button class="mode" data-mode="pet">🐾 펫</button>
  </div>
  <div id="panelFurniture">
    <div class="search"><input id="search" placeholder="가구 이름 검색 (예: 소파, 무지개, 침대)"></div>
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>
  <div id="panelChar" class="editor" style="display:none"></div>
  <div id="panelPet" class="editor" style="display:none"></div>
</div>

<!-- color picker popup -->
<div class="pop" id="pop">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* =========================================================
   PALETTES  (재질/색상)
   roles: main(몸체) dark(그늘/다리) light(하이라이트) accent(쿠션/포인트)
========================================================= */
const PALETTES = [
  {id:'cream',  name:'크림',     main:'#F2E0C0', dark:'#D9BD93', light:'#FBF2E0', accent:'#E0A878'},
  {id:'oak',    name:'오크',     main:'#D9A871', dark:'#B98449', light:'#EDC692', accent:'#9c6b3e'},
  {id:'walnut', name:'월넛',     main:'#9C6B45', dark:'#774d2e', light:'#BD8B62', accent:'#5e3b22'},
  {id:'mint',   name:'민트',     main:'#A8D8C8', dark:'#7fb6a4', light:'#C9ECE0', accent:'#6aa890'},
  {id:'sage',   name:'세이지',   main:'#A6BE96', dark:'#84a071', light:'#C6D8B8', accent:'#6f8b5e'},
  {id:'sky',    name:'하늘',     main:'#A7C8DE', dark:'#7fa6c2', light:'#C9E0EE', accent:'#6a93b3'},
  {id:'blush',  name:'블러쉬',   main:'#EDB7BA', dark:'#d18f93', light:'#F8D6D8', accent:'#cd7a80'},
  {id:'lilac',  name:'라일락',   main:'#C6B6E0', dark:'#a692c8', light:'#E0D4F0', accent:'#9579bd'},
  {id:'terra',  name:'테라코타', main:'#E0966B', dark:'#bf7148', light:'#F0B68F', accent:'#a85b35'},
  {id:'mustard',name:'머스타드', main:'#E7C36B', dark:'#c79f43', light:'#F5DA94', accent:'#a87f2f'},
  {id:'charcoal',name:'차콜',    main:'#7C7E86', dark:'#5a5c63', light:'#9FA1A9', accent:'#45474d'},
  {id:'cocoa',  name:'코코아',   main:'#B59078', dark:'#8f6d56', light:'#D2B099', accent:'#6e503c'},
  {id:'coral',  name:'코랄',     main:'#F09A89', dark:'#d2725f', light:'#FBBCB0', accent:'#c25a48'},
  {id:'butter', name:'버터',     main:'#F6E1A8', dark:'#dcc27e', light:'#FCF0CE', accent:'#caa84f'},
];
const P = Object.fromEntries(PALETTES.map(p=>[p.id,p]));

/* ---- RAINBOW / 그라데이션 팔레트 ---- */
function _hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function _mix(hex,t,amt){const a=_hx(hex),b=_hx(t);const m=a.map((v,i)=>Math.round(v+(b[i]-v)*amt));return '#'+m.map(v=>v.toString(16).padStart(2,'0')).join('');}
function _stops(cols){const n=cols.length-1;return cols.map((c,i)=>`<stop offset="${(i/n).toFixed(3)}" stop-color="${c}"/>`).join('');}
const RAINBOW=[
 {id:'rainbow',  name:'무지개',      dir:'h', cols:['#FF6B6B','#FF9F45','#FFD43B','#69DB7C','#4DABF7','#9775FA','#F783AC']},
 {id:'rainbowV', name:'세로무지개',  dir:'v', cols:['#FF6B6B','#FF9F45','#FFD43B','#69DB7C','#4DABF7','#9775FA','#F783AC']},
 {id:'pastelrb', name:'파스텔무지개',dir:'h', cols:['#FFB3BA','#FFDFBA','#FFF5BA','#BAFFC9','#BAE1FF','#D5BAFF','#FFBAED']},
 {id:'neon',     name:'네온무지개',  dir:'h', cols:['#FF3CAC','#FF8A00','#FFEA00','#00FF85','#00E0FF','#7A5CFF','#FF3CAC']},
 {id:'sunset',   name:'선셋',        dir:'d', cols:['#FF5E62','#FF9966','#FFC371','#F76B8A','#A05195']},
 {id:'aurora',   name:'오로라',      dir:'d', cols:['#43E97B','#38F9D7','#3CA0FF','#5B6CFF','#9D7BFF']},
 {id:'candy',    name:'캔디',        dir:'d', cols:['#FF9A9E','#FAD0C4','#FBC2EB','#A6C1EE','#C2E9FB']},
 {id:'unicorn',  name:'유니콘',      dir:'d', cols:['#FBC2EB','#A18CD1','#FAD0C4','#A1C4FD','#C2FFD8']},
 {id:'ocean',    name:'바다',        dir:'v', cols:['#2BC0E4','#64E9EE','#56CCF2','#2F80ED','#5B6CFF']},
 {id:'galaxy',   name:'갤럭시',      dir:'d', cols:['#7028E4','#B24BCB','#9D4EDD','#5A189A','#FF6BD6']},
].map(p=>Object.assign(p,{grad:true}));

let _gseq=0;
function buildGrad(p){
  const id=++_gseq;
  const dir = p.dir==='v'?'x1="0" y1="0" x2="0" y2="1"'
            : p.dir==='d'?'x1="0" y1="0" x2="1" y2="1"'
            : 'x1="0" y1="0" x2="1" y2="0"';
  const mainC=p.cols,
        lightC=p.cols.map(c=>_mix(c,'#ffffff',.5)),
        darkC =p.cols.map(c=>_mix(c,'#3a2a3a',.42)),
        accC  =p.cols.slice().reverse();
  const g=(gid,cols)=>`<linearGradient id="${gid}" ${dir}>${_stops(cols)}</linearGradient>`;
  const defs = g('rbM'+id,mainC)+g('rbL'+id,lightC)+g('rbD'+id,darkC)+g('rbA'+id,accC);
  const pal={name:p.name, main:`url(#rbM${id})`, light:`url(#rbL${id})`, dark:`url(#rbD${id})`, accent:`url(#rbA${id})`};
  return {defs, pal};
}

/* leaf greens for plants (independent of pot palette) */
const LEAF = {a:'#7FB069',b:'#5C8C4A',c:'#A8CE8F'};

/* =========================================================
   FURNITURE MODELS
   each: {cat, name, w, h, bw(base width px), fix(true=palette only affects accent), draw(p)}
========================================================= */
const M = []; // models
const add=(cat,name,w,h,bw,draw,opt={})=>M.push({cat,name,w,h,bw,draw,...opt});

/* helpers */
const _f=(fill,extra)=>(extra&&extra.indexOf('fill=')>=0)?'':`fill="${fill}"`;
const r=(x,y,w,h,fill,rx=4,extra='')=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" ${_f(fill,extra)} ${extra}/>`;
const c=(cx,cy,rr,fill,extra='')=>`<circle cx="${cx}" cy="${cy}" r="${rr}" ${_f(fill,extra)} ${extra}/>`;
const e=(cx,cy,rx,ry,fill,extra='')=>`<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" ${_f(fill,extra)} ${extra}/>`;
const path=(d,fill,extra='')=>`<path d="${d}" ${_f(fill,extra)} ${extra}/>`;
const leg=(x,y,w,h,fill)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${w/2}" fill="${fill}"/>`;

/* ---------- 소파 SOFA (cat:sofa) ---------- */
add('sofa','3인 소파',160,96,150,p=>`
 ${leg(20,82,8,12,p.dark)}${leg(132,82,8,12,p.dark)}
 ${r(8,30,144,52,p.main,16)}
 ${r(2,40,22,46,p.dark,11)}${r(136,40,22,46,p.dark,11)}
 ${r(20,26,120,30,p.light,14)}
 ${r(26,52,40,26,p.accent,9)}${r(74,52,40,26,p.accent,9)}`);

function svgFor(item, sizePx){
  const m=item.m; let p=item.p; let defs='';
  if(p.grad){ const b=buildGrad(p); p=b.pal; defs=`<defs>${b.defs}</defs>`; }
  const w = sizePx || m.bw;

}

const stage=document.getElementById('stage');
const emptyEl=document.getElementById('empty');
const selbar=document.getElementById('selbar');
let placed=[]; let selId=null; let zTop=10; let uid=1;

function refreshEmpty(){ emptyEl.style.display = placed.length? 'none':'flex'; }

function spawn(makeFn, baseW, atX, atY){
  const sw=stage.clientWidth, sh=stage.clientHeight;
  const id='p'+(uid++);
  const el=document.createElement('div');
  el.className='item'; el.dataset.id=id;
  el.innerHTML=`<div class="ring"></div>`+makeFn(baseW);
  let x = atX!=null? atX : sw/2 - baseW/2 + (Math.random()*40-20);
  let y = atY!=null? atY : sh*0.5 + (Math.random()*60-30);
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.transform='scale(1)';
  stage.appendChild(el);
  const rec={id, el, x, y, scale:1, flip:false, z:++zTop, w:baseW, make:makeFn};
  el.style.zIndex=rec.z;
  placed.push(rec);
  enableDrag(rec);
  select(id);
  refreshEmpty();
  return rec;
}

function placeItem(it, atX, atY){
  const sw=stage.clientWidth;
  const baseW = it.m.bw * (sw<420? 0.82 : 1);
  return spawn((w)=>svgFor(it, w), baseW, atX, atY);
}

function getRec(id){return placed.find(r=>r.id===id);}

function applyTransform(rec){
  rec.el.style.transform=`scale(${rec.scale}) scaleX(${rec.flip?-1:1})`;
}

function select(id){
  selId=id;
  placed.forEach(r=>r.el.classList.toggle('sel', r.id===id));
  selbar.classList.toggle('on', !!id);
}
function deselect(){ selId=null; placed.forEach(r=>r.el.classList.remove('sel')); selbar.classList.remove('on'); }

stage.addEventListener('pointerdown', ev=>{
  if(ev.target===stage || ev.target.id==='floor' || ev.target===emptyEl) deselect();
});

/* drag with pointer events */
function enableDrag(rec){
  const el=rec.el;
  let startX,startY,origX,origY,dragging=false,moved=false;
  el.addEventListener('pointerdown', ev=>{
    ev.stopPropagation();
    select(rec.id);
    // bring to interaction but keep z
    dragging=true; moved=false;
    startX=ev.clientX; startY=ev.clientY; origX=rec.x; origY=rec.y;
    el.setPointerCapture(ev.pointerId);
    el.style.cursor='grabbing';
  });
  el.addEventListener('pointermove', ev=>{
    if(!dragging) return;
    const dx=ev.clientX-startX, dy=ev.clientY-startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    let nx=origX+dx, ny=origY+dy;
    const sw=stage.clientWidth, sh=stage.clientHeight;
    const ww=rec.w*rec.scale, hh=el.offsetHeight*rec.scale;
    nx=Math.max(-ww*0.4, Math.min(sw-ww*0.6, nx));
    ny=Math.max(-hh*0.3, Math.min(sh-hh*0.5, ny));
    rec.x=nx; rec.y=ny;
    el.style.left=nx+'px'; el.style.top=ny+'px';
  });
  const end=ev=>{ if(!dragging)return; dragging=false; el.style.cursor='grab'; };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

/* selection toolbar actions */
selbar.addEventListener('click', ev=>{
  const act=ev.target.dataset.act; if(!act) return;
  const rec=getRec(selId); if(!rec) return;
  if(act==='small'){ rec.scale=Math.max(0.4, rec.scale-0.12); applyTransform(rec); }
  else if(act==='big'){ rec.scale=Math.min(3, rec.scale+0.12); applyTransform(rec); }
  else if(act==='flip'){ rec.flip=!rec.flip; applyTransform(rec); }
  else if(act==='front'){ rec.z=++zTop; rec.el.style.zIndex=rec.z; }
  else if(act==='back'){ rec.z=Math.max(1, rec.z-3); rec.el.style.zIndex=rec.z; }
  else if(act==='copy'){ const n=spawn(rec.make, rec.w, rec.x+24, rec.y+18); n.scale=rec.scale; n.flip=rec.flip; applyTransform(n); }
  else if(act==='del'){ rec.el.remove(); placed=placed.filter(r=>r.id!==rec.id); deselect(); refreshEmpty(); }
});

function buildCharacter(o,w){
  w=w||92; const W=120,H=185,h=w*(H/W);
  const ctx={defs:''};
  const s=resolveCol(o.skinColor,ctx);
  const hairC=resolveCol(o.hairColor,ctx), topC=resolveCol(o.topColor,ctx), botC=resolveCol(o.bottomColor,ctx),
        shoeC=resolveCol(o.shoesColor,ctx), hatC=resolveCol(o.hatColor,ctx), accC=resolveCol(o.accColor,ctx);
  const hs=HAIR[o.hair]||HAIR.bob, tp=TOP[o.top]||TOP.tshirt;
  const body=[
    hs.back?hs.back(hairC):'',
    LEGS(s),
    (SHOES[o.shoes]||(()=>''))(shoeC),
    tp.dress?'':(BOTTOM[o.bottom]||(()=>''))(botC),
    ARMS(s),
    tp.draw(topC),
    HEAD(s),
    (FACE[o.face]||FACE.smile)(),
    hs.front?hs.front(hairC):'',
    (HAT[o.hat]||(()=>''))(hatC),
    (ACC[o.acc]||(()=>''))(accC)
  ].join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg"><defs>${ctx.defs}</defs>${body}</svg>`;
}

 glasses:k=>`${c(49,40,7,'#fff','opacity="0.2"')}${c(61,40,7,'#fff','opacity="0.2"')}${c(49,40,7,'none','stroke="'+k+'" stroke-width="2.6"')}${c(61,40,7,'none','stroke="'+k+'" stroke-width="2.6"')}${path('M56 40 L54 40','none','stroke="'+k+'" stroke-width="2.6"')}`,
 sun:k=>`${c(49,40,7,k)}${c(61,40,7,k)}${path('M56 40 L54 40','none','stroke="'+k+'" stroke-width="3"')}`,
 scarf:k=>`${path('M36 52 Q55 60 74 52 L74 58 Q55 66 36 58 Z',k)}${path('M50 58 L46 74 L56 74 L58 58 Z',k)}`,
 flower:k=>`${c(36,24,4,k)}${c(43,20,4,k)}${c(48,26,4,k)}${c(41,30,4,k)}${c(42,25,2,'#FFE08A')}`,
 star:k=>`${STAR(80,46,5.5,k)}`,
 balloon:k=>`${c(88,16,9,k)}${path('M88 16 L85 25 L91 25 Z',k)}${path('M88 25 Q90 42 80 56','none','stroke="#b9b0a4" stroke-width="1.2" fill="none"')}`
};
function buildPet(o,w){
  w=w||104; const W=110,H=96,h=w*(H/W);
  const ctx={defs:''};
  const col=resolveCol(o.color,ctx), accC=resolveCol(o.accColor,ctx);
  const body=(PETS[o.type]||PETS.dog)(col);
  const accs=(o.accs||[]).map(a=>(PETACC[a]||(()=>''))(accC)).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg"><defs>${ctx.defs}</defs>${body}${accs}</svg>`;
}

function makeEditor(panel, cfg){
  const state=cfg.state;
  const focus={ck:cfg.focusInit};
  panel.innerHTML='';
  const head=document.createElement('div'); head.className='edhead';
  const pv=document.createElement('div'); pv.className='preview-box';
  const prev=document.createElement('div'); prev.className='preview-svg';
  const side=document.createElement('div'); side.className='preview-side';
  const place=document.createElement('button'); place.className='bigbtn'; place.textContent='🏠 방에 놓기';
  const rand=document.createElement('button'); rand.className='minibtn'; rand.textContent='🎲 랜덤';
  side.append(place,rand); pv.append(prev,side); head.append(pv);
  panel.append(head);
  const upd=()=>{ prev.innerHTML=cfg.builder(state, cfg.prevSize); };

  cfg.parts.forEach(part=>{
    const row=document.createElement('div'); row.className='prow';
    const lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=part.name;
    const chips=document.createElement('div'); chips.className='chips';
    part.opts.forEach(([id,label])=>{
      const sel = part.multi ? (state[part.key]||[]).indexOf(id)>=0 : state[part.key]===id;
      const ch=document.createElement('button'); ch.className='chip'+(sel?' on':''); ch.textContent=label; ch.dataset.id=id;
      ch.onclick=()=>{
        if(part.multi){
          const arr=state[part.key]||(state[part.key]=[]);
          const i=arr.indexOf(id); if(i>=0) arr.splice(i,1); else arr.push(id);
          ch.classList.toggle('on');
        } else {
          state[part.key]=id; chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); ch.classList.add('on');
        }
        if(part.ck){focus.ck=part.ck; updFocus();} upd();
      };
      chips.append(ch);
    });
    row.append(lbl,chips); panel.append(row);
  });

  const strip=document.createElement('div'); strip.className='colorstrip';
  const slbl=document.createElement('div'); slbl.className='lbl'; slbl.innerHTML='🎨 색상 <span></span>';
  const focusSpan=slbl.querySelector('span');
  const cols=document.createElement('div'); cols.className='cols'; const dots=[];
  const addDot=(bg,val)=>{ const d=document.createElement('div'); d.className='cdot'; d.style.background=bg; d.dataset.val=val;
    d.onclick=()=>{ if(!focus.ck)return; state[focus.ck]=val; markDots(); upd(); }; cols.append(d); dots.push(d); };
  COLORS.forEach(hx=>addDot(hx,hx));
  RAINBOW.forEach(rb=>addDot(`linear-gradient(135deg,${rb.cols.join(',')})`, rb.id));
  strip.append(slbl,cols); head.append(strip);

  function markDots(){ const cur=focus.ck?state[focus.ck]:null; dots.forEach(d=>d.classList.toggle('on', d.dataset.val===cur)); }
  function updFocus(){ focusSpan.textContent='▸ '+(cfg.nameForCK[focus.ck]||''); markDots(); }
  function rebuildChips(){ const rows=panel.querySelectorAll('.prow'); cfg.parts.forEach((part,i)=>{ rows[i].querySelectorAll('.chip').forEach(ch=>{ const sel=part.multi?(state[part.key]||[]).indexOf(ch.dataset.id)>=0:state[part.key]===ch.dataset.id; ch.classList.toggle('on',sel); }); }); }

  place.onclick=()=>{ const snap=JSON.parse(JSON.stringify(state)); const sw=stage.clientWidth; const bw=cfg.baseW*(sw<420?0.9:1.05); spawn((w)=>cfg.builder(snap,w), bw); if(catalogEl.classList.contains('min')) toggleBtn.click(); };
  rand.onclick=()=>{ cfg.parts.forEach(p=>{
      if(p.multi){ const arr=[]; p.opts.forEach(([id])=>{ if(Math.random()<0.4) arr.push(id); }); state[p.key]=arr; }
      else { const o=p.opts[Math.floor(Math.random()*p.opts.length)]; state[p.key]=o[0]; }
    });
    const pool=COLORS.concat(RAINBOW.map(rr=>rr.id));
    cfg.ckList.forEach(ck=> state[ck]=pool[Math.floor(Math.random()*pool.length)]);
    rebuildChips(); markDots(); upd(); };

  updFocus(); upd();
}

    catalogEl.classList.toggle('editing', m!=='furniture');
    if(catalogEl.classList.contains('min')) toggleBtn.click();
  });
})();
