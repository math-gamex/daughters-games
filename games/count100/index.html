<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Rainbow Counting Game • Surprise Mode (Fixed)</title>
<style>
  :root{--bg:#fafafa;--fg:#111;--border:#d9d9d9;--muted:#666;}
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--fg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;
  }
  header{
    width:100%;max-width:920px;padding:14px 16px;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
  }
  h1{margin:0;font-size:22px;font-weight:900}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  button,select{
    border:1px solid var(--border);background:#fff;color:#111;
    border-radius:12px;padding:10px 14px;font-size:15px;font-weight:700;
    cursor:pointer;min-height:44px;
  }
  button.primary{background:#111;color:#fff;border-color:#111}
  button:active{transform:scale(.97)}

  main{width:100%;max-width:920px;padding:8px 16px 20px;display:grid;grid-template-columns:1fr;gap:10px}
  .topbar{
    border:1px solid var(--border);border-radius:12px;padding:10px 12px;
    display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;
    background:#fff;
  }
  .status{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .pill{padding:6px 10px;border-radius:999px;background:#fff;border:1px solid var(--border);font-weight:800}
  .prompt{font-weight:900;font-size:18px}
  .board{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}

  .tile{
    aspect-ratio:1/1;border:1.5px solid var(--border);border-radius:12px;
    background:#fff;display:flex;align-items:center;justify-content:center;position:relative;
    user-select:none;cursor:pointer;transition:background .2s,transform .1s,box-shadow .15s,filter .15s;
  }
  .tile:hover{transform:scale(1.06);box-shadow:0 3px 8px rgba(0,0,0,.15)}
  .tile:active{transform:scale(.95)}
  .tile.tapped{filter:saturate(130%) brightness(1.05);
    box-shadow:0 0 0 3px rgba(255,255,255,.6) inset,0 0 0 2px rgba(0,0,0,.1)}

  /* number text kept separate so we can hide it safely */
  .num{
    font-weight:900;
    font-size:min(5.1vw,28px);
    line-height:1;
    color:#111;
    letter-spacing:.2px;
  }
  @media(min-width:700px){.num{font-size:28px}}

  /* Hide Numbers mode */
  body.hide-nums .num{ color:transparent !important; text-shadow:none !important; }

  /* 10 colors: rainbow 7 + pink + sky + gray */
  .c1 {background:#ff4b4b} .c1 .num{color:#fff}
  .c2 {background:#ff8a2b} .c2 .num{color:#fff}
  .c3 {background:#ffd93d} .c3 .num{color:#222}
  .c4 {background:#4cd964} .c4 .num{color:#fff}
  .c5 {background:#4da6ff} .c5 .num{color:#fff}
  .c6 {background:#7a5cff} .c6 .num{color:#fff}
  .c7 {background:#9c27b0} .c7 .num{color:#fff}
  .c8 {background:#ff77b4} .c8 .num{color:#fff}
  .c9 {background:#80deea} .c9 .num{color:#111}
  .c10{background:#b0bec5} .c10 .num{color:#111}

  /* Surprise target blink */
  @keyframes pulse {
    0%{box-shadow:0 0 0 0 rgba(255,181,0,.8)}
    70%{box-shadow:0 0 0 10px rgba(255,181,0,0)}
    100%{box-shadow:0 0 0 0 rgba(255,181,0,0)}
  }
  .blink{animation:pulse 1.2s ease-out infinite;border-color:#ffb500}

  /* wrong shake */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-4px)}
    50%{transform:translateX(4px)}
    75%{transform:translateX(-2px)}
  }
  .wrong{animation:shake .25s linear}

  /* tiny bubble text (shows English name) */
  .bubble{
    position:absolute;bottom:6px;right:8px;font-size:12px;font-weight:800;
    padding:3px 6px;border-radius:999px;background:rgba(255,255,255,.85);color:#111;
    box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none;opacity:0;transform:translateY(0);
    transition:opacity .2s,transform .2s;
  }
  .tile.show-bubble .bubble{opacity:1;transform:translateY(-4px)}

  /* click sparkles */
  .sparkle{
    position:fixed;width:10px;height:10px;pointer-events:none;border-radius:50%;
    background:radial-gradient(circle,#fff,transparent);
    animation:sparkle .7s ease-out forwards;
  }
  @keyframes sparkle{
    0%{transform:translate(0,0) scale(1);opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(0.2);opacity:0}
  }

  footer{padding:14px;color:var(--muted);font-size:14px;text-align:center}
  label.small{font-size:13px;color:#333;font-weight:800;margin-right:4px}

  /* ── iPhone 반응형 ── */
  @media (max-width: 480px) {
    body { padding-bottom: env(safe-area-inset-bottom); }
    h1 { font-size: 16px }
    header { padding: 10px 12px }
    button, select { padding: 8px 10px; font-size: 13px; min-height: 40px; border-radius: 10px }
    .board { gap: 4px }
    .tile { border-radius: 8px }
    .bubble { font-size: 10px; bottom: 3px; right: 4px; padding: 2px 4px }
  }
</style>
</head>
<body>
  <header>
    <h1>🌈 Rainbow Counting Game (1–100)</h1>
    <div class="controls">
      <button id="voiceBtn" class="primary">🗣️ Voice: On</button>
      <label class="small" for="readLang">Reading:</label>
      <select id="readLang" title="Audio language">
        <option value="en">English</option>
        <option value="kr">Korean</option>
        <option value="both">Both</option>
      </select>
      <button id="toggleBtn">Hide Numbers</button>
      <button id="resetBtn">Reset All</button>
    </div>
  </header>

  <main>
    <div class="topbar">
      <div class="status">
        <span class="pill" id="modePill">Mode: Normal</span>
        <span class="pill">Target: <strong id="targetLabel">—</strong></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="prompt" id="promptText">Tap any number!</span>
        <button id="surpriseBtn">🎲 New Surprise</button>
      </div>
    </div>

    <div id="board" class="board" role="grid" aria-label="100 grid"></div>
  </main>

  <footer>Click any tile to color it and hear the number. Use 🎲 to start Surprise mode.</footer>

<script>
(() => {
  const board     = document.getElementById('board');
  const voiceBtn  = document.getElementById('voiceBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const toggleBtn = document.getElementById('toggleBtn');
  const readLang  = document.getElementById('readLang');

  const surpriseBtn = document.getElementById('surpriseBtn');
  const promptText  = document.getElementById('promptText');
  const targetLabel = document.getElementById('targetLabel');
  const modePill    = document.getElementById('modePill');

  /* ===== 10 Colors ===== */
  const colorClasses = ['c1','c2','c3','c4','c5','c6','c7','c8','c9','c10'];

  /* ===== English number names ===== */
  const EN_1_19=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const EN_TENS=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  function englishNumber(n){
    if(n===100) return 'one hundred';
    if(n<20) return EN_1_19[n];
    const t=Math.floor(n/10), o=n%10;
    return EN_TENS[t]+(o?' '+EN_1_19[o]:'');
  }

  /* ===== Korean number names ===== */
  const K_NUM=['','일','이','삼','사','오','육','칠','팔','구'];
  function koreanNumber(n){
    if(n===100) return '백';
    if(n<10) return K_NUM[n];
    const tens=Math.floor(n/10), ones=n%10;
    let s=(tens===1?'십':K_NUM[tens]+'십');
    if(ones>0) s+=K_NUM[ones];
    return s;
  }

  /* ===== Web Speech voices ===== */
  let voiceOn=true;
  let voiceEN=null, voiceKR=null;

  function pickVoice(langPattern, prefers=[]){
    const list=window.speechSynthesis?window.speechSynthesis.getVoices():[];
    if(!list||!list.length) return null;
    for(const name of prefers){
      const v=list.find(v=>v.name.includes(name)&&new RegExp(langPattern,'i').test(v.lang));
      if(v) return v;
    }
    return list.find(v=>new RegExp(langPattern,'i').test(v.lang))||null;
  }
  function refreshVoices(){
    voiceEN = pickVoice('^en(-|_)US',['Samantha','Allison','Joanna','Jenny','Google US English']) || pickVoice('^en',[]);
    voiceKR = pickVoice('^ko(-|_)KR',['Yuna','Google 한국의']) || pickVoice('^ko',[]);
  }
  function ensureVoicesReady(){
    refreshVoices();
    if((!voiceEN||!voiceKR) && window.speechSynthesis){
      window.speechSynthesis.addEventListener('voiceschanged',()=>refreshVoices(),{once:true});
    }
  }
  ensureVoicesReady();

  function speak(text, langTag){
    if(!voiceOn||!window.speechSynthesis||!text) return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang=langTag;
    if(langTag.startsWith('en')&&voiceEN) u.voice=voiceEN;
    if(langTag.startsWith('ko')&&voiceKR) u.voice=voiceKR;
    u.rate=1.0; u.pitch=1.0;
    try{window.speechSynthesis.cancel();}catch(e){}
    window.speechSynthesis.speak(u);
  }
  function speakBoth(koText,enText){
    if(!voiceOn||!window.speechSynthesis) return;
    const u1=new SpeechSynthesisUtterance(koText); u1.lang='ko-KR'; if(voiceKR) u1.voice=voiceKR;
    const u2=new SpeechSynthesisUtterance(enText); u2.lang='en-US'; if(voiceEN) u2.voice=voiceEN;
    try{window.speechSynthesis.cancel();}catch(e){}
    window.speechSynthesis.speak(u1);
    u1.addEventListener('end',()=>window.speechSynthesis.speak(u2),{once:true});
  }

  /* ===== Surprise state ===== */
  let surpriseActive=false;
  let targetNum=null;

  function clearBlink(){
    if(targetNum){
      const el=document.querySelector(`[data-n="${targetNum}"]`);
      if(el) el.classList.remove('blink');
    }
  }
  function setBlink(n){
    clearBlink();
    const el=document.querySelector(`[data-n="${n}"]`);
    if(el) el.classList.add('blink');
  }

  function startSurprise(){
    surpriseActive=true;
    modePill.textContent='Mode: Surprise';
    targetNum = Math.floor(Math.random()*100)+1;
    targetLabel.textContent = String(targetNum);
    promptText.textContent = `Find number ${targetNum}!`;
    setBlink(targetNum);
  }
  function stopSurprise(){
    surpriseActive=false;
    modePill.textContent='Mode: Normal';
    targetLabel.textContent='—';
    promptText.textContent='Tap any number!';
    clearBlink();
    targetNum=null;
  }

  /* ===== Sparkles & Win jingle ===== */
  function sparkles(x,y,count=14){
    for(let i=0;i<count;i++){
      const s=document.createElement('div');
      s.className='sparkle';
      const ang=Math.random()*Math.PI*2;
      const dist= 40 + Math.random()*40;
      s.style.left=`${x}px`; s.style.top=`${y}px`;
      s.style.setProperty('--dx', `${Math.cos(ang)*dist}px`);
      s.style.setProperty('--dy', `${Math.sin(ang)*dist}px`);
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),700);
    }
  }

  let audioCtx=null;
  function ensureAudio(){
    if(!audioCtx){
      const AC=window.AudioContext||window.webkitAudioContext;
      audioCtx=AC?new AC():null;
    }
  }
  function winJingle(){
    ensureAudio(); if(!audioCtx) return;
    const notes=[523.25,659.25,783.99,1046.5]; // C5-E5-G5-C6
    const now=audioCtx.currentTime;
    notes.forEach((f,i)=>{
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.type='triangle'; o.frequency.value=f;
      const t=now+i*0.09;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+0.12);
    });
  }

  /* ===== Build grid ===== */
  for(let i=1;i<=100;i++){
    const t=document.createElement('button');
    t.className='tile';
    t.dataset.n=String(i);
    t.setAttribute('role','gridcell');
    t.setAttribute('aria-label',String(i));

    // number span (ensures visibility by CSS)
    const nSpan=document.createElement('span');
    nSpan.className='num';
    nSpan.textContent=String(i);
    t.appendChild(nSpan);

    const bub=document.createElement('span');
    bub.className='bubble';
    t.appendChild(bub);

    t.addEventListener('click',(ev)=>{
      const idx=(i-1)%10;
      const hasColor=colorClasses.some(c=>t.classList.contains(c));
      t.classList.remove(...colorClasses,'tapped','show-bubble','wrong');

      // color toggle
      if(hasColor){
        // back to white
        // (no inline color changes; CSS handles number color)
      }else{
        t.classList.add(colorClasses[idx],'tapped');
      }

      // speak number (according to selection)
      const en=englishNumber(i), ko=koreanNumber(i);
      const mode=readLang.value;
      if(mode==='en') speak(en,'en-US');
      else if(mode==='kr') speak(ko,'ko-KR');
      else speakBoth(ko,en);

      // bubble always shows English word
      bub.textContent=en;
      t.classList.add('show-bubble');
      setTimeout(()=>t.classList.remove('show-bubble'),700);

      // Surprise logic
      if(surpriseActive){
        if(i===targetNum){
          promptText.textContent='Perfect! 🎉';
          clearBlink();
          const rect=t.getBoundingClientRect();
          sparkles(rect.left+rect.width/2, rect.top+rect.height/2);
          winJingle();
          setTimeout(startSurprise, 900); // next round
        }else{
          t.classList.add('wrong');
          setTimeout(()=>t.classList.remove('wrong'),250);
          promptText.textContent=`Find number ${targetNum}!`;
        }
      }
    });

    board.appendChild(t);
  }

  /* ===== Controls ===== */
  function resetBoard(){
    document.querySelectorAll('.tile').forEach(t=>{
      t.classList.remove(...colorClasses,'tapped','show-bubble','blink','wrong');
    });
  }

  voiceBtn.addEventListener('click',()=>{
    voiceOn=!voiceOn;
    voiceBtn.textContent=voiceOn?'🗣️ Voice: On':'🤐 Voice: Off';
    if(!voiceOn&&window.speechSynthesis){
      try{window.speechSynthesis.cancel();}catch(e){}
    }
  });

  // Hide numbers via body class — no inline styles
  toggleBtn.addEventListener('click',()=>{
    document.body.classList.toggle('hide-nums');
    toggleBtn.textContent = document.body.classList.contains('hide-nums')
      ? 'Show Numbers' : 'Hide Numbers';
  });

  resetBtn.addEventListener('click',()=>{
    resetBoard();
    stopSurprise();
  });

  surpriseBtn.addEventListener('click',()=>{
    resetBoard();
    startSurprise();
  });

  // Ensure voices/audio after first gesture (iOS/WebKit)
  document.addEventListener('click', function once(){
    ensureVoicesReady();
    ensureAudio();
    document.removeEventListener('click', once);
  });

  // Initial UI state
  document.body.classList.remove('hide-nums'); // numbers visible on load
  toggleBtn.textContent='Hide Numbers';
})();
</script>
</body>
</html>
