<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 게임 모음</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #e0eaff 50%, #fffde0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 24px;
    }

    h1 {
      font-size: 2.2rem;
      color: #c04a8a;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 #fff;
    }

    p.subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 40px;
      text-align: center;
    }

    .games {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 32px;
      width: 240px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.15);
    }

    .card .emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
    }

    .card .title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    .card .desc {
      font-size: 0.85rem;
      color: #aaa;
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>

  <h1>✨ 우리 게임 모음 ✨</h1>
  <p class="subtitle">클릭해서 게임을 시작하세요!</p>

  <div class="games">
    <a class="card" href="unicorn-dress-up.html">
      <span class="emoji">🦄</span>
      <div class="title">알리콘 무지개 빤짝이<br>옷 입히기</div>
      <div class="desc">유니콘을 예쁘게 꾸며 보세요</div>
    </a>

    <a class="card" href="dollhouse.html">
      <span class="emoji">🏠</span>
      <div class="title">포근한 집 꾸미기</div>
      <div class="desc">나만의 아늑한 집을 꾸며 보세요</div>
    </a>
  </div>

  <footer>Made with ❤️ by our daughters</footer>

</body>
</html>
